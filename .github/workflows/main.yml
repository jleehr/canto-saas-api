on: [push, pull_request]
name: Test

# The jobs only read the checkout; deny the GITHUB_TOKEN any write scope by
# default so a compromised step cannot push, open PRs, or alter releases.
permissions:
  contents: read

jobs:
  zizmor:
    name: Zizmor (Actions security scan)
    runs-on: ubuntu-latest
    permissions:
      # zizmor can post SARIF findings to the Security tab; without this it
      # still fails the job on findings, so the upload is best-effort.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  roave_bc_check:
    name: Roave BC Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # roave-backward-compatibility-check needs full history + tags to
          # locate the baseline release; a shallow clone fails fast.
          fetch-depth: 0
      - name: Roave BC Check
        # Pinned by digest so Dependabot's github-actions ecosystem can track
        # it (a `docker run` inside a `run:` step would be invisible to it).
        # The entrypoint is overridden to mark the workspace as a safe git
        # directory: the container runs as root while the checkout is owned by
        # the runner user, which otherwise trips git's dubious-ownership guard.
        uses: docker://nyholm/roave-bc-check-ga@sha256:a9d3d932a4d3ba6a5a0563ef3788918a538198ee9c061a153f9b55caa8d3625f
        with:
          entrypoint: sh
          args: '-c "git config --global --add safe.directory /github/workspace && PATH=/composer/vendor/bin:$PATH roave-backward-compatibility-check"'

  test:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: ['ubuntu-latest']
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        composer-options: ['']
        composer-versions: ['composer:v2']
        include:
          # Lowest supported dependencies, tested on the minimum PHP version.
          # prefer-lowest pulls dev tools that predate newer PHP runtimes, so it
          # is only meaningful on the floor version.
          - operating-system: 'ubuntu-latest'
            php: '8.1'
            composer-options: '--prefer-lowest'
            composer-versions: 'composer:v2'
      fail-fast: true
    name: PHP ${{ matrix.php }} ${{ matrix.composer-options }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          tools: ${{ matrix.composer-versions }}
          extensions: xdebug, mbstring, posix
      - name: Check Versions
        run: |
          php -v
          php -m
          composer --version
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_ENV
      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer update --prefer-dist --no-progress ${{ matrix.composer-options }}
      - name: Set git variables
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
      - name: Run GrumPHP Tests
        run: php vendor/bin/grumphp run --no-interaction
